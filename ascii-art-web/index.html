<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Day 2 Form Practice</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        min-height: 100vh;
        padding: 40px 20px;
      }

     
      .container {
        max-width: 800px;
        margin: 0 auto;
        background: rgba(255, 255, 255, 0.95);
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        backdrop-filter: blur(10px);
      }

      h1 {
        text-align: center;
        color: #2d3748; 
        margin-bottom: 30px;
        font-size: 2.2em;
        font-weight: 800;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        letter-spacing: 1px;
      }


      label {
        font-weight: 600;
        color: #2d3748;
        margin-top: 10px;
        display: inline-block;
      }

      input[type="text"],
      input[type="number"],
      textarea,
      select {
        width: 100%;
        padding: 12px;
        margin-top: 5px;
        border: 2px solid #e2e8f0;
        border-radius: 10px;
        font-size: 16px;
        transition: all 0.3s ease;
        font-family: inherit;
      }

      input[type="text"]:focus,
      input[type="number"]:focus,
      textarea:focus,
      select:focus {
        outline: none;
        border-color: #764ba2;
        box-shadow: 0 0 0 3px rgba(118, 75, 162, 0.1);
      }

      textarea {
        resize: vertical;
        font-family: monospace;
      }

      
      input[type="radio"] {
        margin-right: 8px;
        margin-left: 15px;
        cursor: pointer;
      }

      input[type="radio"]:first-of-type {
        margin-left: 0;
      }

      
      button {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        padding: 14px 30px;
        font-size: 16px;
        font-weight: 600;
        border-radius: 10px;
        cursor: pointer;
        width: 100%;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
        margin-top: 10px;
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
      }

      button:active {
        transform: translateY(0);
      }

      hr {
        margin: 30px 0 20px;
        border: none;
        height: 2px;
        background: linear-gradient(
          to right,
          transparent,
          #764ba2,
          transparent
        );
      }

      pre {
        background: #2d3748;
        color: #e2e8f0;
        padding: 20px;
        border-radius: 10px;
        overflow-x: auto;
        font-family: "Courier New", monospace;
        font-size: 14px;
        line-height: 1.5;
        margin-top: 20px;
        white-space: pre-wrap;
        word-wrap: break-word;
      }

      
      @media (max-width: 600px) {
        .container {
          padding: 20px;
        }

        h1 {
          font-size: 1.5em;
        }

        button {
          padding: 12px 20px;
        }
      }
    </style>
  </head>
  <body>
    <h1>ASCII Web Practice Form</h1>

    <form action="/ascii-art" method="POST">
      <label>Name:</label><br />
      <input type="text" name="name" placeholder="Enter your name" />

      <br /><br />

      <label>Enter Text:</label><br />
      <textarea name="textname" rows="5" cols="40"></textarea>

      <br /><br />

      <label>Select Banner:</label><br />
      <select name="banner">
        <option value="standard">Standard</option>
        <option value="shadow">Shadow</option>
        <option value="thinkertoy">Thinkertoy</option>
      </select>

      <br /><br />

      <button type="submit">Generate ASCII Art</button>
    </form>

    <hr/>

    <pre>{{.}}</pre>
  </body>
</html>
